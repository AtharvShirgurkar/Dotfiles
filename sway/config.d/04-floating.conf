floating_modifier $mod normal

# Force specific apps to float
for_window [app_id="pavucontrol"] floating enable, move position center
for_window [app_id="blueman-manager"] floating enable, move position center
for_window [app_id="nm-connection-editor"] floating enable
for_window [app_id="thunar"] floating enable, resize set 1000 700, move position center
for_window [app_id="hyprpolkitagent"] floating enable, sticky enable, move position center
for_window [app_id="(?i)speedcrunch"] floating enable, move position center, move scratchpad
for_window [class="(?i)speedcrunch"] floating enable, move position center, move scratchpad

# Generic dialogs
for_window [window_role="pop-up"] floating enable
for_window [window_role="task_dialog"] floating enable
for_window [window_type="dialog"] floating enable
