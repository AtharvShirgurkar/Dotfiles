# -------------------------------------------------------------------------
# AC MODE: UNRESTRICTED PERFORMANCE
# -------------------------------------------------------------------------
# Force CPU to maximum performance governor
CPU_SCALING_GOVERNOR_ON_AC=performance

# Tell the hardware to ignore power savings
CPU_ENERGY_PERF_POLICY_ON_AC=performance

# Allow Turbo Boost and Dynamic Boost
CPU_BOOST_ON_AC=1
CPU_HWP_DYN_BOOST_ON_AC=1

# Uncap the P-State limits (100% of CPU capacity available)
CPU_MIN_PERF_ON_AC=0
CPU_MAX_PERF_ON_AC=100

# Firmware/Bios profile
PLATFORM_PROFILE_ON_AC=performance

# Disable NMI Watchdog on AC (reduces slight overhead)
NMI_WATCHDOG=0

# -------------------------------------------------------------------------
# BATTERY MODE: SILENT & COOL
# -------------------------------------------------------------------------
# Use powersave governor
CPU_SCALING_GOVERNOR_ON_BAT=powersave

# Tell hardware to strictly prioritize power
CPU_ENERGY_PERF_POLICY_ON_BAT=power

# 1. DISABLE TURBO BOOST (Significant savings)
CPU_BOOST_ON_BAT=0
CPU_HWP_DYN_BOOST_ON_BAT=0

# 2. CAP CPU PERFORMANCE (The Fan Killer)
# Limits the CPU to 30% of its max capability.
CPU_MIN_PERF_ON_BAT=0
CPU_MAX_PERF_ON_BAT=30

# 3. PLATFORM PROFILE (Prioritize silence)
PLATFORM_PROFILE_ON_BAT=quiet
