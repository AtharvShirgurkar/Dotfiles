# -------------------------------------------------------------------------
# GRAPHICS (INTEL/AMD SPECIFIC)
# -------------------------------------------------------------------------
INTEL_GPU_MIN_FREQ_ON_BAT=100
INTEL_GPU_MAX_FREQ_ON_BAT=450
INTEL_GPU_BOOST_FREQ_ON_BAT=450

# Enable Runtime Power Management for the NVIDIA GPU
RUNTIME_PM_ON_AC=auto
RUNTIME_PM_ON_BAT=auto
# Specifically target the NVIDIA driver
RUNTIME_PM_DRIVER_DENYLIST="mei_me" # Ensure 'nvidia' is NOT in the denylist

# AMD GPU (Radeon) Settings - Uncomment if needed
# RADEON_DPM_PERF_LEVEL_ON_AC=auto
# RADEON_DPM_PERF_LEVEL_ON_BAT=low
# RADEON_POWER_PROFILE_ON_AC=default
# RADEON_POWER_PROFILE_ON_BAT=low
