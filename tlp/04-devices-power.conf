# -------------------------------------------------------------------------
# PCIE & RUNTIME PM
# -------------------------------------------------------------------------
# Maximize PCIe link performance on AC (prevents latency/lag)
PCIE_ASPM_ON_AC=performance

# Powersave for PCIe links on BAT
PCIE_ASPM_ON_BAT=powersave

# Auto-suspend PCI devices (essential for battery)
RUNTIME_PM_ON_BAT=auto

# -------------------------------------------------------------------------
# WIFI & AUDIO
# -------------------------------------------------------------------------
# Enable WiFi power saving (may increase latency slightly)
WIFI_PWR_ON_BAT=on

# Power down audio chip after 1 second of silence
SOUND_POWER_SAVE_ON_BAT=1
SOUND_POWER_SAVE_CONTROLLER=Y

# -------------------------------------------------------------------------
# DISK & FILESYSTEM
# -------------------------------------------------------------------------
# Aggressive link power management for SATA/NVMe
AHCI_RUNTIME_PM_ON_BAT=auto
SATA_LINKPWR_ON_BAT=min_power

# Writeback time (seconds). Higher = disk wakes up less often.
MAX_LOST_WORK_SECS_ON_BAT=60
