# -------------------------------------------------------------------------
# EXTREME BATTERY OPTIMIZATION
# -------------------------------------------------------------------------
# These settings override previous configs to squeeze out maximum runtime.
# -------------------------------------------------------------------------

# 1. NETWORK & RADIOS (Major Savings)
# -------------------------------------------------------------------------
# Completely disable Wake-on-LAN. This prevents the network card from
# keeping the bus active looking for "magic packets" even while sleeping.
WOL_DISABLE=Y

# Kill Bluetooth and NFC immediately when on battery.
# (Bluetooth helps drain battery even when not paired).
DEVICES_TO_DISABLE_ON_BAT="bluetooth"

# Do not auto-enable them when you plug back in (Manual toggle only).
DEVICES_TO_ENABLE_ON_AC=""

# 2. PLATFORM PROFILE (The "Low Power" State)
# -------------------------------------------------------------------------
# You are currently using "quiet". Many modern laptops support "quiet".
# This is a deeper EPP state than quiet. If your hardware doesn't support it,
# TLP will safely fall back to "quiet" or "balanced".
PLATFORM_PROFILE_ON_BAT=quiet

# 3. USB AUTOSUSPEND
# -------------------------------------------------------------------------
# Aggressively cut power to USB devices (Mouse, Keyboard, Webcam) when idle.
# If your mouse lags after 2 seconds of stopping, you can disable this.
USB_AUTOSUSPEND=1

# 4. KERNEL WATCHDOG & SCHEDULER
# -------------------------------------------------------------------------
# Enable kernel scheduler power saving (relaxes scheduling precision).

# Disable the NMI watchdog globally (saves CPU cycles/interrupts).
# (You had this in your AC config, but let's enforce it globally here).
NMI_WATCHDOG=0

# 5. EXTREME DISK CACHING
# -------------------------------------------------------------------------
# Increase writeback time to 2 minutes.
# RAM consumes less power than spinning up the disk or waking the NVMe controller.
# WARNING: If your laptop crashes, you lose the last 120s of work.
MAX_LOST_WORK_SECS_ON_BAT=120
